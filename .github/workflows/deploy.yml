name: Deploy to Namecheap Hosting

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Deploy Files via FTPS
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.HOSTNAME }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}

          # FTPS Settings
          protocol: ftps
          port: 21

          # Files to upload
          local-dir: ./

          # Change this if your website is in another directory
          server-dir: /public_html/

          # Don't delete existing files
          dangerous-clean-slate: false

          # Optional: Increase timeout for slow servers
          timeout: 120000

          # Exclude unnecessary files
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
            **/node_modules/**
            **/.env
            **/README.md
            uploads/**
            /uploads/**